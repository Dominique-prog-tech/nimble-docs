site_name: Nimble Documentatie
site_description: Officiële handleiding voor Nimble
site_author: Dominique
site_url: https://docs.nimble-erp.eu/
copyright: >
  Nimble &copy; 2026 — eigendom van
  <a href="https://www.adm-concept.be" target="_blank" rel="noopener">ADM-Concept</a>.
  Alle rechten voorbehouden.

theme:
  name: material
  language: nl
  logo: images/logo.svg
  favicon: images/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Schakel naar donkere modus
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Schakel naar lichte modus
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  generator: false

